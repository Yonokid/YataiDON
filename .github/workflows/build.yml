name: Build YataiDON (Release)

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            patchelf \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libjack-dev \
            libunwind-dev \
            libusb-1.0-0-dev \
            libxss-dev \
            liblua5.4-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libavdevice-dev \
            libogg-dev \
            libvorbis-dev \
            libflac-dev \
            libopus-dev \
            libmp3lame-dev \
            libmpg123-dev \
            libspeex-dev \
            libwayland-dev \
            libegl-dev \
            libxkbcommon-dev \
            libfribidi-dev \
            libthai-dev \
            libdrm-dev \
            libgbm-dev \
            libsndio-dev \
            libpipewire-0.3-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc \
            -DFETCH_SDL3=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare release package
        run: |
          mkdir -p release/YataiDON-Linux
          cp build/bin/YataiDON release/YataiDON-Linux/
          cp -r Skins release/YataiDON-Linux/
          cp -r shader release/YataiDON-Linux/
          cp config.toml release/YataiDON-Linux/
          chmod +x release/YataiDON-Linux/YataiDON

          # Bundle FFmpeg shared libraries into lib/ so they don't clutter the root
          mkdir -p release/YataiDON-Linux/lib
          ldd build/bin/YataiDON | grep -E "(libav|libsw).*=>" | awk '{print $3}' | \
            xargs -I{} cp -L {} release/YataiDON-Linux/lib/

          # Bundle transitive deps of the FFmpeg libs (e.g. libbz2, liblzma, libxml2)
          # excluding truly universal system libs that every distro provides
          for so in release/YataiDON-Linux/lib/lib{av,sw}*.so*; do
            ldd "$so" 2>/dev/null | grep "=>" | awk '{print $3}' | grep -v "^$" | \
              grep -vE "lib(c\.so|m\.so|dl\.so|rt\.so|pthread\.so|gcc_s\.so|stdc\+\+\.so|X11\.so|GL\.so|asound\.so|pulse\.so|jack\.so|Xi\.so|Xrandr\.so|xcb)" | \
              grep -v "ld-linux" | \
              xargs -I{} cp -L {} release/YataiDON-Linux/lib/ 2>/dev/null || true
          done

          # Binary looks in $ORIGIN/lib; bundled .so files look in $ORIGIN (their own dir)
          patchelf --set-rpath '$ORIGIN/lib' release/YataiDON-Linux/YataiDON
          for so in release/YataiDON-Linux/lib/*.so*; do
            [ -f "$so" ] && patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: YataiDON-Linux
          path: release/YataiDON-Linux/
          if-no-files-found: error

  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libsndfile
            mingw-w64-x86_64-libsamplerate
            mingw-w64-x86_64-lua
            mingw-w64-x86_64-sdl3
            mingw-w64-x86_64-ffmpeg
            make

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc \
            -DFETCH_SDL3=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare release package
        run: |
          mkdir -p release/YataiDON-Windows
          cp build/bin/YataiDON.exe release/YataiDON-Windows/
          cp build/bin/*.dll release/YataiDON-Windows/ 2>/dev/null || true
          cp -r Skins release/YataiDON-Windows/
          cp -r shader release/YataiDON-Windows/
          cp config.toml release/YataiDON-Windows/

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: YataiDON-Windows
          path: release/YataiDON-Windows/
          if-no-files-found: error

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "Linux build: ${{ needs.build-linux.result }}"
          echo "Windows build: ${{ needs.build-windows.result }}"

          if [[ "${{ needs.build-linux.result }}" != "success" ]] || [[ "${{ needs.build-windows.result }}" != "success" ]]; then
            echo "One or more builds failed!"
            exit 1
          fi

          echo "All builds completed successfully!"

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: YataiDON-*
          merge-multiple: true

      - name: Repackage artifacts
        run: |
          zip -r YataiDON-Linux.zip YataiDON Skins shader config.toml lib/
          zip -r YataiDON-Windows.zip YataiDON.exe Skins shader config.toml *.dll

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: YataiDON-*.zip
          name: "YataiDON [Latest Release]"
          tag_name: "latest"
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
