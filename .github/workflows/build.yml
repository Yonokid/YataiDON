name: Build YataiDON (Release)

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Configure Git credentials
        run: |
          git config --global url."https://${{ secrets.GITEA_USER }}:${{ secrets.GITEA_TOKEN }}@ese.tjadataba.se/".insteadOf "https://ese.tjadataba.se/"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            patchelf \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libjack-dev \
            liblua5.4-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libavdevice-dev \
            libogg-dev \
            libvorbis-dev \
            libflac-dev \
            libopus-dev \
            libmp3lame-dev \
            libmpg123-dev \
            libspeex-dev \
            libdw-dev

      - name: Setup SDL3
        id: sdl
        uses: libsdl-org/setup-sdl@main
        with:
          install-linux-dependencies: true
          version: 3-head
          build-type: Release

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare release package
        run: |
          mkdir -p release/YataiDON-Linux
          cp build/bin/YataiDON release/YataiDON-Linux/
          cp -r Skins release/YataiDON-Linux/
          cp -r shader release/YataiDON-Linux/
          cp -r Songs release/YataiDON-Linux/
          cp config.toml release/YataiDON-Linux/
          chmod +x release/YataiDON-Linux/YataiDON

          # Bundle FFmpeg shared libraries into lib/
          mkdir -p release/YataiDON-Linux/lib
          ldd build/bin/YataiDON | grep -E "(libav|libsw).*=>" | awk '{print $3}' | \
            xargs -I{} cp -L {} release/YataiDON-Linux/lib/

          # Bundle sndfile codec dependencies (ogg, vorbis, FLAC, opus, mp3, etc.)
          ldd build/bin/YataiDON | grep -E "(libsndfile|libogg|libvorbis|libFLAC|libopus|libmp3lame|libmpg123|libspeex).*=>" | awk '{print $3}' | \
            grep -v "^$" | xargs -I{} cp -L {} release/YataiDON-Linux/lib/ 2>/dev/null || true

          # Bundle transitive deps of FFmpeg AND sndfile codec libs
          for so in release/YataiDON-Linux/lib/lib{av,sw,ogg,vorbis,FLAC,opus,mp3lame,mpg123,speex}*.so*; do
            ldd "$so" 2>/dev/null | grep "=>" | awk '{print $3}' | grep -v "^$" | \
              grep -vE "lib(c\.so|m\.so|dl\.so|rt\.so|pthread\.so|gcc_s\.so|stdc\+\+\.so|X11\.so|GL\.so|asound\.so|pulse\.so|jack\.so|Xi\.so|Xrandr\.so|xcb)" | \
              grep -v "ld-linux" | \
              xargs -I{} cp -L {} release/YataiDON-Linux/lib/ 2>/dev/null || true
          done

          # Patch rpath: binary looks in $ORIGIN/lib, bundled .so files look in $ORIGIN
          patchelf --set-rpath '$ORIGIN/lib' release/YataiDON-Linux/YataiDON
          for so in release/YataiDON-Linux/lib/*.so*; do
            [ -f "$so" ] && patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done

          # Skin manifest for git-managed skins
          # Fields: path<TAB>repo_url<TAB>commit<TAB>checksums_url
          git submodule status | while IFS=' ' read -r commit path _; do
            url=$(git config -f .gitmodules submodule."$path".url)
            c="${commit#[-+ ]}"
            base="${url%.git}"
            if echo "$base" | grep -q "github.com"; then
              checksums_url="${base/github.com/raw.githubusercontent.com}/$c/checksums.sha256"
            else
              checksums_url="$base/raw/commit/$c/checksums.sha256"
            fi
            printf '%s\t%s\t%s\t%s\n' "$path" "$url" "$c" "$checksums_url"
          done > release/YataiDON-Linux/skin-manifest.tsv

          # Checksums — binary + shader + lib only (skins handled separately)
          (
            cd release/YataiDON-Linux
            sha256sum YataiDON
            find shader -type f | sort | xargs sha256sum
            [ -d lib ] && find lib -type f | sort | xargs sha256sum || true
          ) > release/YataiDON-Linux/checksums-linux.sha256

          # Per-skin checksums for individual file updates (no git required)
          while IFS=$'\t' read -r skin_path repo_url commit; do
            skin_name=$(basename "$skin_path")
            (
              cd "release/YataiDON-Linux/$skin_path"
              find . -type f -not -path './.git/*' | sort | xargs sha256sum | sed 's|^\./||'
            ) > "release/YataiDON-Linux/skin-${skin_name}.sha256"
          done < release/YataiDON-Linux/skin-manifest.tsv

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: YataiDON-Linux
          path: release/YataiDON-Linux/
          if-no-files-found: error

  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Configure Git credentials
        shell: bash
        run: |
          git config --global url."https://${{ secrets.GITEA_USER }}:${{ secrets.GITEA_TOKEN }}@ese.tjadataba.se/".insteadOf "https://ese.tjadataba.se/"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libsndfile
            mingw-w64-x86_64-libsamplerate
            mingw-w64-x86_64-lua
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-sdl3
            make

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare release package
        shell: bash
        run: |
          mkdir -p release/YataiDON-Windows
          cp build/bin/YataiDON.exe release/YataiDON-Windows/
          cp build/bin/*.dll release/YataiDON-Windows/ 2>/dev/null || true
          cp -r Skins release/YataiDON-Windows/
          cp -r shader release/YataiDON-Windows/
          cp -r Songs release/YataiDON-Windows/
          cp config.toml release/YataiDON-Windows/

          # Skin manifest for git-managed skins
          # Fields: path<TAB>repo_url<TAB>commit<TAB>checksums_url
          git submodule status | while IFS=' ' read -r commit path _; do
            url=$(git config -f .gitmodules submodule."$path".url)
            c="${commit#[-+ ]}"
            base="${url%.git}"
            if echo "$base" | grep -q "github.com"; then
              checksums_url="${base/github.com/raw.githubusercontent.com}/$c/checksums.sha256"
            else
              checksums_url="$base/raw/commit/$c/checksums.sha256"
            fi
            printf '%s\t%s\t%s\t%s\n' "$path" "$url" "$c" "$checksums_url"
          done > release/YataiDON-Windows/skin-manifest.tsv

          # Checksums — excludes git-managed skins, Songs, config.toml
          # Checksums — binary + dlls + shader only (skins handled separately)
          (
            cd release/YataiDON-Windows
            sha256sum YataiDON.exe
            find shader -type f | sort | xargs sha256sum
            find . -maxdepth 1 -name "*.dll" | sort | xargs sha256sum
          ) > release/YataiDON-Windows/checksums-windows.sha256

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: YataiDON-Windows
          path: release/YataiDON-Windows/
          if-no-files-found: error

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "Linux build: ${{ needs.build-linux.result }}"
          echo "Windows build: ${{ needs.build-windows.result }}"

          if [[ "${{ needs.build-linux.result }}" != "success" ]] || [[ "${{ needs.build-windows.result }}" != "success" ]]; then
            echo "One or more builds failed!"
            exit 1
          fi

          echo "All builds completed successfully!"

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: YataiDON-Linux
          path: linux/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: YataiDON-Windows
          path: windows/

      - name: Package release assets
        run: |
          # Full zips for manual download
          (cd linux   && zip -r ../YataiDON-Linux.zip .)
          (cd windows && zip -r ../YataiDON-Windows.zip .)

          # Metadata files
          cp linux/checksums-linux.sha256   ./checksums-linux.sha256
          cp windows/checksums-windows.sha256 ./checksums-windows.sha256
          cp linux/skin-manifest.tsv ./skin-manifest.tsv

          # Linux update package: binary + shader + lib
          UPDATE_LINUX="YataiDON shader/"
          [ -d linux/lib ] && UPDATE_LINUX="$UPDATE_LINUX lib/"
          tar -czf update-linux.tar.gz -C linux $UPDATE_LINUX

          # Windows update package: binary + dlls + shader
          UPDATE_WIN="YataiDON.exe shader/"
          for dll in windows/*.dll; do
            [ -f "$dll" ] && UPDATE_WIN="$UPDATE_WIN $(basename "$dll")"
          done
          tar -czf update-windows.tar.gz -C windows $UPDATE_WIN

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YataiDON-Linux.zip
            YataiDON-Windows.zip
            update-linux.tar.gz
            update-windows.tar.gz
            checksums-linux.sha256
            checksums-windows.sha256
            skin-manifest.tsv
          name: "YataiDON [Latest Release]"
          tag_name: "latest"
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
